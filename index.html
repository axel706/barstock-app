  window.pushInventoryToDB = async function () {
    try {
      if (!state || !Array.isArray(state.master)) {
        alert('no inventory');
        return;
      }

      const rows = state.master.map(r => ({
        code: r.code || '',
        item_name: r.item || '',

      console.error(e);

})();
