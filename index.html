<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarStock Pro V3.0.1</title>
  



<script>
window.pushInventoryToDB = async function () {
  try {
    if (typeof state === 'undefined' || !state || !Array.isArray(state.master)) {
      alert('no inventory found');
      return;
    }

    const { data: locationRow, error: locationError } = await supabaseClient
      .from('locations')
      .select('id')
      .eq('name', 'The Crown Tavern')
      .single();

    if (locationError || !locationRow) {
      console.error(locationError);
      alert('could not find The Crown Tavern location');
      return;
    }

    const rows = state.master.map(r => ({
      location_id: locationRow.id,
      code: r.code || '',
      item_name: r.item || '',
      vendor: r.vendor || '',
      suggested: Number(r.suggested || 0),
      on_hand: Number(r.onHand || 0),
      value: Number(r.value || 0)
    }));

    const { error } = await supabaseClient
      .from('inventory_items')
      .insert(rows);

    if (error) {
      console.error(error);
      alert('error: ' + error.message);
      return;
    }

    alert('inventory pushed 🚀');
  } catch (e) {
    console.error(e);
    alert('crash: ' + e.message);
  }
};
</script>

</body>
</html>
